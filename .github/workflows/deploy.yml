name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test (CI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Verify and Test Java Spring Boot Backend
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build & Test Backend
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw clean test

      # 2. Verify and Build Vite React Frontend
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci
      - name: Compile Frontend Production Bundle
        run: |
          cd frontend
          npm run build

  deploy:
    name: Deploy to AWS EC2 (CD)
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/billspay-website
            
            # Fetch the newest code change and hard reset to match main branch
            git fetch --all
            git reset --hard origin/main
            
            # Bring down current running containers
            docker compose down
            
            # Use Buildkit with restricted worker memory allocation to safeguard your 1GB RAM
            export DOCKER_BUILDKIT=1
            docker compose up --build -d

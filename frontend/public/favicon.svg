<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E3A8A"/>
      <stop offset="1" stop-color="#1B2D6B"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background — navy blue matching the logo -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Bold "B" letter in white -->
  <text x="8" y="23" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="white">B</text>
  <!-- Green checkmark at top-right — matches logo's green tick -->
  <path d="M20 8 L23.5 12 L29 5" stroke="#22C55E" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
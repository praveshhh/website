# ==============================================================================
# Nginx Configuration Template for BillsPay24X7
# Place this file in /etc/nginx/sites-available/billspay-new on your AWS Server
# ==============================================================================

# Server block for HTTPS (port 443 with SSL)
# Nginx reads the host header to decide which domain is being requested
server {
    listen 80;
    server_name newdomain.com www.newdomain.com;

    # Redirect all HTTP requests to HTTPS (auto-handled by Certbot, uncomment after running certbot)
    # return 301 https://$host$request_uri;

    # Static React Vite Frontend build directory
    root /var/www/billspay-new/dist;
    index index.html;

    # Fallback to index.html for Single Page Application (SPA) routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API endpoints to the Spring Boot backend running on port 8082
    location /api {
        proxy_pass http://localhost:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Real IP headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Optional: Serve H2 console if needed (restrict access to trust IPs in production!)
    # location /h2-console {
    #     proxy_pass http://localhost:8082/h2-console;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
}
